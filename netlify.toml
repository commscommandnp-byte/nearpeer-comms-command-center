[build]
  publish = "public"
  command = "node scripts/netlify-build-check.js"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/api/wati/summary"
  to = "/.netlify/functions/wati-summary"
  status = 200

[[redirects]]
  from = "/api/wati/discover"
  to = "/.netlify/functions/wati-discover"
  status = 200

[[redirects]]
  from = "/api/wati/webhook"
  to = "/.netlify/functions/wati-webhook"
  status = 200

[[redirects]]
  from = "/api/wati/sync"
  to = "/.netlify/functions/wati-sync"
  status = 200
